# BrownButter Shopify Automation - Configuration File
# Fill in your actual credentials and settings

# ============================================================================
# SHOPIFY CONFIGURATION
# ============================================================================
shopify:
  store_name: "your-store-name"  # Example: if URL is brownbutter.myshopify.com, use "brownbutter"
  api_version: "2024-01"
  access_token: "shpat_xxxxxxxxxxxxxxxxxxxxx"  # Replace with your Shopify Admin API token


# Cloudinary Configuration (add this section)
cloudinary:
  cloud_name: "dti84w6xv"
  api_key: "969682281952258"
  api_secret: "iwLRWnYA9YI9sar4UUP74-kVLgI"
  folder: "brownbutter_products"  # Optional: organize images in folder

# ============================================================================
# GOOGLE SHEETS CONFIGURATION
# ============================================================================
google_sheets:
  spreadsheet_name: "BrownButter Shopify Upload - Pilot"  # Exact name of your Google Sheet
  credentials_file: "google_credentials.json"
  
  # Tab names (don't change unless you renamed tabs)
  tabs:
    product_data: "Product Data"
    image_links: "Image Links"
    config: "Config"
    shopify_csv: "Shopify CSV"

# ============================================================================
# SCRIPT SETTINGS
# ============================================================================
settings:
  batch_size: 10  # Process images in batches (for progress tracking)
  rate_limit_delay: 0.5  # Seconds to wait between API calls (Shopify allows 2/sec)
  max_retries: 3  # Number of retry attempts for failed operations
  resume_on_failure: true  # Continue from last successful upload if script crashes
  
# ============================================================================
# IMAGE SETTINGS
# ============================================================================
images:
  temp_download_dir: "temp_downloads"  # Local folder for temporary image storage
  max_size_mb: 20  # Maximum allowed image file size
  allowed_formats: ['.jpg', '.jpeg', '.png', '.webp']
  convert_to_jpg: true  # Convert all images to JPG format
  jpg_quality: 90  # JPG compression quality (0-100, higher = better quality)

# ============================================================================
# DEFAULT PRODUCT VALUES
# ============================================================================
defaults:
  vendor: "BrownButter"
  weight_grams: 500
  inventory_per_size: 5
  published: true  # Set to false if you want products as draft
  status: "active"  # or "draft"
  requires_shipping: true
  taxable: true
  inventory_policy: "deny"  # or "continue" to allow overselling
  
# ============================================================================
# SIZE MAPPINGS (Category → Size Options)
# ============================================================================
size_mappings:
  women_dress: ['XS', 'S', 'M', 'L', 'XL']
  women_top: ['XS', 'S', 'M', 'L', 'XL']
  women_bottom: ['26', '28', '30', '32', '34']
  men_shirt: ['S', 'M', 'L', 'XL', 'XXL']
  men_trouser: ['30', '32', '34', '36', '38']
  men_tshirt: ['S', 'M', 'L', 'XL', 'XXL']
  
# ============================================================================
# TAGS CONFIGURATION
# ============================================================================
tags:
  # Universal tags applied to ALL products
  universal:
    - "new-arrival"
    - "brownbutter"
    - "premium"
    - "indian-fashion"
  
  # Category-specific tags (applied based on product category)
  category_specific:
    women_dress:
      - "dresses"
      - "western-wear"
      - "party-wear"
    women_top:
      - "tops"
      - "casual-wear"
      - "work-wear"
    women_bottom:
      - "bottoms"
      - "jeans"
      - "trousers"
    men_shirt:
      - "shirts"
      - "formal-wear"
      - "casual-shirts"
    men_trouser:
      - "trousers"
      - "formal-pants"
      - "casual-pants"
  
  # Gender-based tags
  gender_tags:
    Women: ["women"]
    Men: ["men"]
    Unisex: ["unisex"]

# ============================================================================
# SEO CONFIGURATION
# ============================================================================
seo:
  title_suffix: " | BrownButter - Premium Fashion"
  description_template: "Shop {title} at BrownButter. Premium quality, affordable prices. Free shipping on orders above ₹999."
  max_description_length: 320

# ============================================================================
# SHOPIFY PRODUCT CATEGORY MAPPING
# ============================================================================
shopify_categories:
  women_dress: "Apparel & Accessories > Clothing > Dresses"
  women_top: "Apparel & Accessories > Clothing > Shirts & Tops"
  women_bottom: "Apparel & Accessories > Clothing > Pants"
  men_shirt: "Apparel & Accessories > Clothing > Shirts & Tops"
  men_trouser: "Apparel & Accessories > Clothing > Pants"

# ============================================================================
# LOGGING
# ============================================================================
logging:
  log_file: "brownbutter_automation.log"
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  console_output: true
